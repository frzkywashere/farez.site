<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Warfare - Air Combat Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            touch-action: none;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameCanvas {
            border: 3px solid #fff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            z-index: 10;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.3);
            border: 2px solid white;
            border-radius: 10px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            user-select: none;
            backdrop-filter: blur(5px);
        }

        .control-btn:active {
            background: rgba(255,255,255,0.6);
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
        }

        .btn {
            padding: 15px 30px;
            margin: 10px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.1);
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-align: center;
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @media (max-width: 768px) {
            #controls {
                display: grid;
            }
            
            h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div>Score: <span id="score">0</span></div>
            <div>Kills: <span id="kills">0</span></div>
            <div>Health: <span id="health">100</span>%</div>
        </div>

        <div id="controls">
            <div></div>
            <button class="control-btn" data-key="ArrowUp">↑</button>
            <div></div>
            <button class="control-btn" data-key="ArrowLeft">←</button>
            <button class="control-btn" data-key="Space">🔥</button>
            <button class="control-btn" data-key="ArrowRight">→</button>
            <div></div>
            <button class="control-btn" data-key="ArrowDown">↓</button>
            <div></div>
        </div>

        <div id="startScreen">
            <h1>SKY WARFARE</h1>
            <p style="font-size: 20px; margin-bottom: 30px;">Air Combat Simulator</p>
            <p style="margin-bottom: 20px;">PC: WASD/Arrows to move, SPACE to shoot<br>Mobile: Use on-screen controls</p>
            <button class="btn" onclick="startGame()">START GAME</button>
        </div>

        <div id="gameOverScreen" style="display: none;">
            <h1>GAME OVER</h1>
            <p style="font-size: 24px; margin-bottom: 20px;">Final Score: <span id="finalScore">0</span></p>
            <p style="font-size: 20px; margin-bottom: 30px;">Kills: <span id="finalKills">0</span></p>
            <button class="btn" onclick="restartGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        function resizeCanvas() {
            canvas.width = Math.min(window.innerWidth - 40, 800);
            canvas.height = Math.min(window.innerHeight - 40, 600);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game state
        let gameRunning = false;
        let score = 0;
        let kills = 0;
        let keys = {};
        let lastShot = 0;
        let shotCooldown = 200;

        // Player
        const player = {
            x: 0,
            y: 0,
            width: 40,
            height: 30,
            speed: 5,
            health: 100,
            maxHealth: 100
        };

        // Arrays for game objects
        let bullets = [];
        let enemies = [];
        let particles = [];
        let clouds = [];

        // Initialize clouds
        function initClouds() {
            clouds = [];
            for (let i = 0; i < 8; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    width: 60 + Math.random() * 40,
                    height: 30 + Math.random() * 20,
                    speed: 0.5 + Math.random() * 0.5
                });
            }
        }

        // Draw functions
        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Main body
            ctx.fillStyle = '#2c3e50';
            ctx.fillRect(-20, -15, 40, 30);
            
            // Wings
            ctx.fillStyle = '#34495e';
            ctx.beginPath();
            ctx.moveTo(-20, -5);
            ctx.lineTo(-35, -15);
            ctx.lineTo(-35, 15);
            ctx.lineTo(-20, 5);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(20, -5);
            ctx.lineTo(35, -15);
            ctx.lineTo(35, 15);
            ctx.lineTo(20, 5);
            ctx.fill();
            
            // Cockpit
            ctx.fillStyle = '#87CEEB';
            ctx.beginPath();
            ctx.arc(0, -5, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // Engine glow
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(-20, 0, 5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        function drawBullet(bullet) {
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(bullet.x - 2, bullet.y - 1, 4, 2);
            
            // Bullet trail
            ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
            ctx.fillRect(bullet.x - 8, bullet.y - 1, 6, 2);
        }

        function drawEnemy(enemy) {
            ctx.save();
            ctx.translate(enemy.x, enemy.y);
            
            if (enemy.type === 'heavy') {
                // Heavy enemy - bigger and darker
                ctx.fillStyle = '#8b0000';
                ctx.fillRect(-25, -20, 50, 40);
                
                ctx.fillStyle = '#a52a2a';
                ctx.beginPath();
                ctx.moveTo(-25, -10);
                ctx.lineTo(-40, -20);
                ctx.lineTo(-40, 20);
                ctx.lineTo(-25, 10);
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(25, -10);
                ctx.lineTo(40, -20);
                ctx.lineTo(40, 20);
                ctx.lineTo(25, 10);
                ctx.fill();
                
                // Health bar
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(-25, -30, 50 * (enemy.health / enemy.maxHealth), 4);
            } else {
                // Normal enemy
                ctx.fillStyle = '#dc143c';
                ctx.fillRect(-15, -12, 30, 24);
                
                ctx.fillStyle = '#ff4500';
                ctx.beginPath();
                ctx.moveTo(-15, -6);
                ctx.lineTo(-25, -12);
                ctx.lineTo(-25, 12);
                ctx.lineTo(-15, 6);
                ctx.fill();
                
                ctx.beginPath();
                ctx.moveTo(15, -6);
                ctx.lineTo(25, -12);
                ctx.lineTo(25, 12);
                ctx.lineTo(15, 6);
                fill();
            }
            
            ctx.restore();
        }

        function drawParticle(particle) {
            ctx.globalAlpha = particle.life / 30;
            ctx.fillStyle = particle.color;
            ctx.beginPath();
            ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        function drawCloud(cloud) {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.beginPath();
            ctx.ellipse(cloud.x, cloud.y, cloud.width, cloud.height, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // Update functions
        function updatePlayer() {
            if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
            if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
            
            // Keep player in bounds
            player.x = Math.max(20, Math.min(canvas.width - 20, player.x));
            player.y = Math.max(20, Math.min(canvas.height - 20, player.y));
        }

        function shoot() {
            const now = Date.now();
            if (now - lastShot > shotCooldown) {
                bullets.push({
                    x: player.x + 20,
                    y: player.y,
                    speed: 8
                });
                lastShot = now;
            }
        }

        function spawnEnemy() {
            if (Math.random() < 0.02) {
                const type = Math.random() < 0.3 ? 'heavy' : 'normal';
                enemies.push({
                    x: canvas.width + 50,
                    y: Math.random() * (canvas.height - 100) + 50,
                    width: type === 'heavy' ? 50 : 30,
                    height: type === 'heavy' ? 40 : 24,
                    speed: type === 'heavy' ? 1.5 : 3,
                    health: type === 'heavy' ? 3 : 1,
                    maxHealth: type === 'heavy' ? 3 : 1,
                    type: type
                });
            }
        }

        function createExplosion(x, y, color = '#ff6b6b') {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 30,
                    size: Math.random() * 4 + 2,
                    color: color
                });
            }
        }

        function checkCollisions() {
            // Bullets vs Enemies
            for (let i = bullets.length - 1; i >= 0; i--) {
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const bullet = bullets[i];
                    const enemy = enemies[j];
                    
                    if (bullet && enemy &&
                        Math.abs(bullet.x - enemy.x) < enemy.width/2 + 2 &&
                        Math.abs(bullet.y - enemy.y) < enemy.height/2 + 1) {
                        
                        bullets.splice(i, 1);
                        enemy.health--;
                        
                        if (enemy.health <= 0) {
                            createExplosion(enemy.x, enemy.y, enemy.type === 'heavy' ? '#8b0000' : '#dc143c');
                            enemies.splice(j, 1);
                            score += enemy.type === 'heavy' ? 200 : 100;
                            kills++;
                            updateUI();
                        }
                        break;
                    }
                }
            }
            
            // Enemies vs Player
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                if (Math.abs(enemy.x - player.x) < (enemy.width + player.width)/2 &&
                    Math.abs(enemy.y - player.y) < (enemy.height + player.height)/2) {
                    
                    player.health -= enemy.type === 'heavy' ? 20 : 10;
                    createExplosion(enemy.x, enemy.y, '#ff0000');
                    enemies.splice(i, 1);
                    updateUI();
                    
                    if (player.health <= 0) {
                        gameOver();
                    }
                }
            }
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('kills').textContent = kills;
            document.getElementById('health').textContent = Math.max(0, player.health);
        }

        // Main game loop
        function gameLoop() {
            if (!gameRunning) return;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw clouds
            clouds.forEach(cloud => {
                cloud.x -= cloud.speed;
                if (cloud.x + cloud.width < 0) {
                    cloud.x = canvas.width + cloud.width;
                    cloud.y = Math.random() * canvas.height;
                }
                drawCloud(cloud);
            });
            
            // Update and draw game objects
            updatePlayer();
            drawPlayer();
            
            // Update bullets
            bullets = bullets.filter(bullet => {
                bullet.x += bullet.speed;
                drawBullet(bullet);
                return bullet.x < canvas.width + 10;
            });
            
            // Update enemies
            enemies = enemies.filter(enemy => {
                enemy.x -= enemy.speed;
                drawEnemy(enemy);
                return enemy.x > -50;
            });
            
            // Update particles
            particles = particles.filter(particle => {
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.life--;
                drawParticle(particle);
                return particle.life > 0;
            });
            
            spawnEnemy();
            checkCollisions();
            
            requestAnimationFrame(gameLoop);
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') {
                e.preventDefault();
                shoot();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Mobile controls
        document.querySelectorAll('.control-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const key = btn.dataset.key;
                keys[key] = true;
                if (key === 'Space') shoot();
            });
            
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys[btn.dataset.key] = false;
            });
            
            btn.addEventListener('mousedown', () => {
                keys[btn.dataset.key] = true;
                if (btn.dataset.key === 'Space') shoot();
            });
            
            btn.addEventListener('mouseup', () => {
                keys[btn.dataset.key] = false;
            });
        });

        // Mouse shooting
        canvas.addEventListener('click', shoot);

        // Game control functions
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            resetGame();
            initClouds();
            gameLoop();
        }

        function resetGame() {
            player.x = 100;
            player.y = canvas.height / 2;
            player.health = 100;
            score = 0;
            kills = 0;
            bullets = [];
            enemies = [];
            particles = [];
            updateUI();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalKills').textContent = kills;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            gameRunning = true;
            resetGame();
            gameLoop();
        }

        // Auto-start for testing
        // startGame();
    </script>
</body>
</html>
